# Project-local Helix language + LSP wiring for Comrade files.

[language-server.edgelord-lsp]
command = "cargo"
args = ["run", "--quiet", "--bin", "edgelord-lsp"]

[[language]]
name = "comrade"
scope = "source.lisp"
file-types = ["comrade"]
roots = ["Cargo.toml", ".git"]
auto-format = false
language-servers = ["edgelord-lsp"]
