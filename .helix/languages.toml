# EdgeLorD / MacLane Language Support for Helix
# Copy this to ~/.config/helix/languages.toml or include it in your config

[[language]]
name = "maclane"
scope = "source.maclane"
injection-regex = "maclane"
file-types = ["maclane", "ml", "edgelord"]
comment-token = ";"
indent = { tab-width = 2, unit = "  " }
roots = []
language-servers = ["edgelord-lsp"]

[language-server.edgelord-lsp]
command = "/Users/e/Documents/MotivicCohomology/GitLocal/EdgeLorD/target/debug/edgelord-lsp"
args = []

# Configuration options (optional)
[language-server.edgelord-lsp.config]
debounceIntervalMs = 250
logLevel = "info"
enableDb7HoverPreview = true
cachesEnabled = true
